name: Update Stance Data

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch member data
        run: python scripts/fetch_members.py

      - name: Fetch contact data
        run: python scripts/fetch_contacts.py

      - name: Fetch governor data
        run: python scripts/fetch_governors.py

      # Re-apply manual stance overrides after member data refresh
      - name: Apply stance overrides
        run: python scripts/scrape_stances.py

      # LLM stance updates are run locally (requires ANTHROPIC_API_KEY).
      # To update stances: python scripts/scrape_stances_llm.py --all --delay 1.0

      - name: Validate data
        run: python scripts/validate_data.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/content/ src/data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/ src/data/
          git commit -m "chore: update member stance data [automated]"
          git push
